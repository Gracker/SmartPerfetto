# =============================================================================
# WebView Surface Control Pipeline
# =============================================================================
# Modern WebView with Viz/OOP-R and SurfaceControl.
# Independent composition without blocking App RenderThread.
# =============================================================================

name: pipeline_webview_surface_control
version: "1.0"
type: pipeline_definition
category: rendering

meta:
  pipeline_id: WEBVIEW_SURFACE_CONTROL
  display_name: "WebView Surface Control"
  description: "现代 WebView + Viz/OOP-R，独立合成"
  icon: "web"
  family: webview
  doc_path: "rendering_pipelines/webview_surface_control.md"

detection:
  scoring_signals:
    - signal: has_viz_compositor
      thread_pattern: "VizCompositorThread*"
      weight: 55
    - signal: has_cr_renderer
      thread_pattern: "CrRendererMain*"
      weight: 12
    - signal: has_surface_control
      slice_pattern: "*SurfaceControl*"
      weight: 15

  exclude_if:
    - thread: "1.ui"           # Flutter engine present → use Flutter pipeline

teaching:
  title: "WebView Surface Control 渲染管线"
  summary: |
    现代 WebView 使用 Viz (Visual Compositor) 和 OOP-R (Out-of-Process Rasterization)
    进行渲染时，可能通过 SurfaceControl 独立提交到 SurfaceFlinger。
    browser code 与 GPU / network services 通常仍在宿主 app 进程内；
    是否启用该模式、是否完全不阻塞宿主 RenderThread，要以具体设备和 trace 为准。

  mermaid: |
    sequenceDiagram
      participant CR as CrRendererMain
      participant Viz as VizCompositorThread
      participant SC as SurfaceControl
      participant TX as Transaction
      participant VS as VSync-sf
      participant SF as SurfaceFlinger

      Note over CR,SF: 📍 WebView Surface Control (条件成立时的独立合成)
      CR->>CR: Blink 渲染网页
      CR->>Viz: 提交合成任务

      activate Viz
      Viz->>Viz: GPU 光栅化 Tiles
      Viz->>Viz: 合成网页 Layers
      Viz->>SC: 创建/更新 SurfaceControl
      Viz->>TX: ASurfaceTransaction
      TX->>SF: 独立提交 Transaction
      deactivate Viz

      VS->>SF: 🔔 VSync-sf
      activate SF
      SF->>SF: latchBuffer
      SF->>SF: HWC Composite
      deactivate SF

      Note over CR,SF: ✨ 独立于 App RenderThread，不阻塞 UI
  thread_roles:
    - thread: VizCompositorThread
      role: "Viz 合成器"
      description: "Chromium 可视化合成器，线程名可能表现为 VizCompositorThread 或相近名称"
    - thread: CrRendererMain
      role: "Chromium 渲染"
      description: "WebView 内容渲染"

  key_slices:
    - name: "VizCompositorThread (hint)"
      thread: VizCompositorThread
      description: "Viz 合成提示信号，未必稳定可见"
    - name: "SurfaceControl"
      thread: any
      description: "SurfaceControl 事务"

auto_pin:
  instructions:
    # Time-ordered pinning (production -> transfer -> consume -> display)
    - pattern: "^VSYNC-app$"
      match_by: name
      priority: 1
      reason: "VSync (WebView 开始生产帧)"

    - pattern: "^main(\\s+\\d+)?$"
      match_by: name
      priority: 2
      reason: "WebView 宿主 UI (生产)"
      expand: true  # 展开显示 Running 状态和 callstack
      smart_filter:
        enabled: true
        description: "仅 Pin 活跃渲染进程的宿主主线程"

    - pattern: "CrRendererMain"
      match_by: name
      priority: 3
      reason: "Chromium 渲染 (生产/传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 属于当前 app 的 Chromium 渲染进程"

    - pattern: "VizCompositorThread|VizCompositor"
      match_by: name
      priority: 4
      reason: "Viz 合成器 (传输)"
      smart_filter:
        enabled: true
        description: "仅 Pin 属于当前 app 的 Viz 合成器线程/进程"

    - pattern: "^VSYNC-sf$"
      match_by: name
      priority: 5.5
      reason: "VSync (SurfaceFlinger 消费/合成)"

    - pattern: "^BufferTX"
      match_by: name
      priority: 6
      reason: "BufferTX (SurfaceFlinger 事务)"

    - pattern: "^[sS]urface[fF]linger"
      match_by: name
      priority: 7
      reason: "SurfaceFlinger (最终合成/显示)"
      main_thread_only: true

analysis:
  common_issues:
    - id: viz_latency
      name: "Viz 延迟"
      description: "Viz 合成器处理延迟"
      detection_skill: sf_frame_consumption

  recommended_skills:
    - sf_frame_consumption
    - cpu_analysis
